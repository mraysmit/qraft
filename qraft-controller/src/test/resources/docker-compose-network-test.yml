version: '3.8'

# Qraft 5-Node Controller Cluster for Advanced Network Testing with Testcontainers
# NOTE: container_name removed for Testcontainers compatibility

services:
  controller1:
    build:
      context: ../../../..
      dockerfile: qraft-controller/Dockerfile
      additional_contexts:
        m2cache: ${M2_REPO:-~/.m2/repository}/dev/mars
    hostname: controller1
    environment:
      - QRAFT_NODE_ID=controller1
      - QRAFT_RAFT_HOST=0.0.0.0
      - QRAFT_RAFT_PORT=9080
      - QRAFT_HTTP_PORT=8080
      - QRAFT_CLUSTER_NODES=controller1=controller1:9080,controller2=controller2:9080,controller3=controller3:9080,controller4=controller4:9080,controller5=controller5:9080
      - QRAFT_RAFT_ELECTION_TIMEOUT_MS=5000
      - QRAFT_RAFT_HEARTBEAT_INTERVAL_MS=1000
      - JAVA_OPTS=-Xmx256m -Xms128m
    ports:
      - "8080"
    networks:
      - raft-cluster
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

