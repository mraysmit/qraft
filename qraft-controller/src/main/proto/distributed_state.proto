syntax = "proto3";

option java_multiple_files = true;
option java_package = "dev.mars.qraft.controller.api.grpc";
option java_outer_classname = "DistributedStateProto";

package qraft.api;

// External client-facing gRPC API for replicated key-value state.
// This is intentionally separate from the internal qraft.raft peer RPC protocol.
service DistributedStateService {
  rpc Put(PutRequest) returns (PutResponse) {}
  rpc Get(GetRequest) returns (GetResponse) {}
  rpc Delete(DeleteRequest) returns (DeleteResponse) {}
  rpc List(ListRequest) returns (ListResponse) {}
}

message PutRequest {
  string key = 1;
  string value = 2;
}

message PutResponse {
  bool accepted = 1;
}

message GetRequest {
  string key = 1;
}

message GetResponse {
  bool found = 1;
  string value = 2;
}

message DeleteRequest {
  string key = 1;
}

message DeleteResponse {
  bool deleted = 1;
}

message ListRequest {
}

message Entry {
  string key = 1;
  string value = 2;
}

message ListResponse {
  repeated Entry entries = 1;
}
