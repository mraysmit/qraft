# =============================================================================
# Qraft Agent Configuration
# =============================================================================
# All settings can be overridden by environment variables.
# Environment variables use uppercase with underscores (e.g., AGENT_ID, CONTROLLER_URL)
# =============================================================================

# -----------------------------------------------------------------------------
# Agent Identity
# -----------------------------------------------------------------------------
# Unique agent identifier. If empty, uses AGENT_ID env var (required)
qraft.agent.id=

# Agent version
qraft.agent.version=1.0.0

# -----------------------------------------------------------------------------
# Controller Connection
# -----------------------------------------------------------------------------
# URL of the Qraft controller API
qraft.agent.controller.url=http://localhost:8080/api/v1

# -----------------------------------------------------------------------------
# Network Configuration
# -----------------------------------------------------------------------------
# Port for agent HTTP server
qraft.agent.port=8080

# Region identifier (for agent selection)
qraft.agent.region=default

# Datacenter identifier (for agent selection)
qraft.agent.datacenter=default

# -----------------------------------------------------------------------------
# Transfer Configuration
# -----------------------------------------------------------------------------
# Maximum concurrent transfers this agent can handle
qraft.agent.transfers.max-concurrent=5

# Supported protocols (comma-separated)
qraft.agent.protocols=HTTP,HTTPS

# -----------------------------------------------------------------------------
# Heartbeat Configuration
# -----------------------------------------------------------------------------
# Interval between heartbeat messages (ms)
qraft.agent.heartbeat.interval-ms=30000

# -----------------------------------------------------------------------------
# Job Polling Configuration
# -----------------------------------------------------------------------------
# Initial delay before starting job polling (ms)
qraft.agent.jobs.polling.initial-delay-ms=5000

# Interval between job polling attempts (ms)
qraft.agent.jobs.polling.interval-ms=10000

# -----------------------------------------------------------------------------
# Security Configuration
# -----------------------------------------------------------------------------
# Allowed foreign assignment mismatches before fail-fast shutdown.
# Default is strict mode (1) for critical-system safety.
qraft.agent.security.foreign-assignment-threshold=1

# -----------------------------------------------------------------------------
# Telemetry Configuration
# -----------------------------------------------------------------------------
# Enable/disable telemetry
qraft.agent.telemetry.enabled=true

# Prometheus metrics HTTP server port
qraft.agent.telemetry.prometheus.port=9465

# OpenTelemetry OTLP exporter endpoint (gRPC)
qraft.agent.telemetry.otlp.endpoint=http://localhost:4317
