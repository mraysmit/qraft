#
# Qraft Core Configuration
# Copyright 2025 Mark Andrew Ray-Smith Cityline Ltd
#
# This file configures the Qraft file transfer engine.
# Values can be overridden via system properties (-Dqraft.xxx=value)
# or environment-specific config files.
#

# ==============================================================================
# Transfer Engine Configuration
# ==============================================================================

# Maximum concurrent transfers per agent
qraft.transfer.max.concurrent=10

# Maximum retry attempts for failed transfers
qraft.transfer.max.retries=3

# Delay between retry attempts (milliseconds)
qraft.transfer.retry.delay.ms=1000

# Buffer size for file operations (bytes)
qraft.transfer.buffer.size=8192

# ==============================================================================
# Network Configuration  
# ==============================================================================

# Connection timeout (milliseconds)
qraft.network.connection.timeout.ms=30000

# Read timeout (milliseconds)
qraft.network.read.timeout.ms=60000

# ==============================================================================
# File Configuration
# ==============================================================================

# Maximum file size for transfers (bytes) - 10GB default
qraft.file.max.size=10737418240

# Checksum algorithm (SHA-256, MD5, SHA-1, SHA-512)
qraft.file.checksum.algorithm=SHA-256

# Temporary directory for in-progress transfers
# Default: system temp directory
# qraft.file.temp.dir=/var/tmp/qraft

# ==============================================================================
# Monitoring Configuration
# ==============================================================================

# Enable/disable metrics collection
qraft.monitoring.metrics.enabled=true

# Enable/disable health check endpoints
qraft.monitoring.health.enabled=true

# State cleanup interval (milliseconds) - 1 hour default
qraft.monitoring.state.cleanup.interval.ms=3600000

# Maximum age for transfer state records (milliseconds) - 24 hours default
qraft.monitoring.state.max.age.ms=86400000

# ==============================================================================
# Protocol-Specific Configuration
# ==============================================================================

# SFTP Configuration
qraft.protocol.sftp.port=22
qraft.protocol.sftp.buffer.size=32768

# FTP Configuration
qraft.protocol.ftp.port=21
qraft.protocol.ftp.buffer.size=32768

# SMB Configuration
qraft.protocol.smb.buffer.size=65536
